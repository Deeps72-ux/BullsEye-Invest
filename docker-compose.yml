version: '3.9'

services:
  web:
    build: ./bulleye_backend
    container_name: bullseye_web
    command: gunicorn bulleye_backend.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./bulleye_backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    container_name: bullseye_db
    restart: always
    environment:
      POSTGRES_DB: bullseye_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: bullseye_redis
    ports:
      - "6379:6379"

  celery:
    build: ./bulleye_backend
    container_name: bullseye_celery
    command: celery -A bulleye_backend worker -l info
    volumes:
      - ./bulleye_backend:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env

  celery-beat:
    build: ./bulleye_backend
    container_name: bullseye_celery_beat
    command: celery -A bulleye_backend beat -l info
    volumes:
      - ./bulleye_backend:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env

volumes:
  postgres_data:
