version: '3.9'

services:
  web:
    build: ./bulleye_backend
    container_name: bullseye_web
    volumes:
      - ./bulleye_backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:15
    container_name: bullseye_db
    restart: always
    environment:
      POSTGRES_DB: bullseye_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: bullseye_redis
    ports:
      - "6379:6379"
    restart: always

  celery:
    build: ./bulleye_backend
    container_name: bullseye_celery
    command: celery -A bulleye_backend worker -l info
    volumes:
      - ./bulleye_backend:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env
    restart: always

  celery-beat:
    build: ./bulleye_backend
    container_name: bullseye_celery_beat
    command: celery -A bulleye_backend beat -l info
    volumes:
      - ./bulleye_backend:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env
    restart: always
    
  frontend:
    build: ./ai-bulls-lens
    container_name: bullseye_frontend
    volumes:
      - ./ai-bulls-lens:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
